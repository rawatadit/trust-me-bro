<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trust Me Bro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0b0b10; --card: #15151c; --card2: #1c1c26; --border: #2a2a38;
  --text: #e4e4ec; --muted: #9898aa; --dim: #5f5f72;
  --green: #22c55e; --red: #ef4444; --blue: #3b82f6; --purple: #a855f7;
  --orange: #f97316; --cyan: #06b6d4; --yellow: #eab308; --pink: #ec4899;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--text); line-height:1.5; }
.container { max-width:1200px; margin:0 auto; padding:24px 20px; }
h1 { font-size:32px; font-weight:800; margin-bottom:4px; }
h1 span { background:linear-gradient(135deg,#3b82f6,#a855f7); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.subtitle { color:var(--dim); font-size:14px; margin-bottom:20px; }
.stats-row { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:24px; }
.stat-card { background:var(--card); border-radius:12px; padding:16px 20px; border:1px solid var(--border); flex:1 1 170px; min-width:150px; }
.stat-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }
.stat-value { font-size:28px; font-weight:700; }
.stat-sub { font-size:11px; color:var(--dim); margin-top:2px; }
.tabs { display:flex; gap:4px; flex-wrap:wrap; background:var(--card); border-radius:10px; padding:4px; border:1px solid var(--border); margin-bottom:24px; }
.tab { padding:10px 18px; border-radius:8px; border:none; cursor:pointer; background:transparent; color:var(--muted); font-weight:400; font-size:14px; transition:all .2s; }
.tab.active { background:var(--blue); color:#fff; font-weight:600; }
.tab:hover:not(.active) { background:var(--card2); }
.panel { display:none; }
.panel.active { display:block; }
.section-title { font-size:18px; font-weight:600; margin:28px 0 16px; }
.card { background:var(--card); border-radius:12px; padding:20px; border:1px solid var(--border); margin-bottom:20px; }
.chart-container { position:relative; width:100%; }
.flex-row { display:flex; gap:20px; flex-wrap:wrap; }
.flex-col { flex:1 1 350px; }
table { width:100%; border-collapse:collapse; font-size:13px; }
th { padding:12px 14px; text-align:left; cursor:pointer; color:var(--muted); font-weight:500; font-size:11px; text-transform:uppercase; letter-spacing:.5px; border-bottom:1px solid var(--border); }
th:hover { color:var(--text); }
td { padding:10px 14px; border-bottom:1px solid var(--border); }
tr:nth-child(even) { background:rgba(255,255,255,.02); }
.ticker { font-weight:700; color:var(--blue); }
.sector-badge { padding:2px 8px; border-radius:4px; font-size:11px; }
.pos { color:var(--green); }
.neg { color:var(--red); }
.signal-feed { max-height:none; overflow:auto; }
.signal-item { padding:12px 16px; border-bottom:1px solid var(--border); cursor:pointer; transition:background .15s; }
.signal-item:hover { background:rgba(255,255,255,.03); }
.signal-header { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
.signal-type { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; min-width:40px; text-align:center; text-transform:uppercase; }
.signal-buy { background:rgba(34,197,94,.15); color:var(--green); }
.signal-sell { background:rgba(239,68,68,.15); color:var(--red); }
.signal-ticker { font-weight:700; color:var(--blue); min-width:50px; }
.signal-date { color:var(--dim); font-size:12px; min-width:80px; }
.signal-msg { color:var(--muted); font-size:13px; flex:1; min-width:150px; }
.signal-return { font-weight:700; font-size:13px; min-width:60px; text-align:right; }
.signal-expand-icon { color:var(--dim); font-size:11px; margin-left:auto; transition:transform .2s; }
.signal-item.expanded .signal-expand-icon { transform:rotate(180deg); }
select { background:var(--card); color:var(--text); border:1px solid var(--border); border-radius:6px; padding:6px 12px; font-size:14px; }
.context-panel { display:none; margin-top:10px; background:var(--bg); border-radius:8px; border:1px solid var(--border); overflow:hidden; }
.signal-item.expanded .context-panel { display:block; }
.ctx-msg { padding:8px 14px; font-size:13px; line-height:1.5; border-bottom:1px solid rgba(255,255,255,.04); display:flex; gap:10px; }
.ctx-msg:last-child { border-bottom:none; }
.ctx-sender { font-weight:600; color:var(--dim); min-width:90px; flex-shrink:0; font-size:12px; }
.ctx-text { color:var(--dim); font-size:13px; }
.ctx-msg.ctx-focal { background:rgba(59,130,246,.08); }
.ctx-msg.ctx-focal .ctx-sender { color:var(--blue); }
.ctx-msg.ctx-focal .ctx-text { color:#fff; font-weight:500; }
.ctx-time { color:var(--dim); font-size:10px; min-width:40px; flex-shrink:0; opacity:.6; }
.framework-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:12px; }
.framework-card { background:var(--card); border-radius:12px; padding:16px; border:1px solid var(--border); }
.framework-name { font-weight:700; color:var(--blue); margin-bottom:6px; font-size:15px; }
.framework-desc { color:var(--muted); font-size:13px; line-height:1.5; }
.quote-list .quote-item { padding:14px 20px; border-bottom:1px solid var(--border); font-size:14px; line-height:1.6; border-left:3px solid var(--blue); }
.quote-list .quote-item:nth-child(2n) { border-left-color:var(--purple); }
.quote-list .quote-item:nth-child(3n) { border-left-color:var(--orange); }
.gantt-row { display:flex; align-items:center; margin-bottom:3px; height:22px; }
.gantt-label { width:80px; font-size:12px; font-weight:600; flex-shrink:0; }
.gantt-track { flex:1; position:relative; height:14px; background:rgba(255,255,255,.03); border-radius:3px; }
.gantt-bar { position:absolute; height:100%; border-radius:3px; opacity:.75; }
.month-labels { display:flex; margin-left:80px; margin-bottom:6px; }
.month-labels span { flex:1; font-size:10px; color:var(--dim); text-align:center; }
.bullbear-item { padding:12px 16px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.persona-summary { line-height:1.8; color:var(--muted); font-size:14px; }
.persona-summary strong { color:var(--text); }
.footer { margin-top:40px; padding:16px 0; border-top:1px solid var(--border); text-align:center; color:var(--dim); font-size:12px; }
.verdict-panel { border-radius:14px; padding:24px; margin-bottom:24px; border:2px solid; position:relative; overflow:hidden; }
.verdict-panel.verdict-green { border-color:#22c55e; background:linear-gradient(135deg, rgba(34,197,94,.08), rgba(34,197,94,.02)); }
.verdict-panel.verdict-yellow { border-color:#eab308; background:linear-gradient(135deg, rgba(234,179,8,.08), rgba(234,179,8,.02)); }
.verdict-panel.verdict-orange { border-color:#f97316; background:linear-gradient(135deg, rgba(249,115,22,.08), rgba(249,115,22,.02)); }
.verdict-panel.verdict-red { border-color:#ef4444; background:linear-gradient(135deg, rgba(239,68,68,.08), rgba(239,68,68,.02)); }
.verdict-label { font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:2px; margin-bottom:8px; }
.verdict-title { font-size:26px; font-weight:800; margin-bottom:4px; }
.verdict-detail { font-size:14px; color:var(--muted); margin-bottom:16px; line-height:1.6; }
.verdict-stats { display:flex; gap:24px; flex-wrap:wrap; }
.verdict-stat { text-align:center; }
.verdict-stat-value { font-size:22px; font-weight:700; }
.verdict-stat-label { font-size:11px; color:var(--dim); text-transform:uppercase; letter-spacing:.5px; }
.verdict-disclaimer { font-size:11px; color:var(--dim); margin-top:14px; font-style:italic; border-top:1px solid var(--border); padding-top:10px; }
</style>
</head>

  <h1><span>Trust Me Bro</span></h1>
  <div class="subtitle" id="subtitle"></div>

  <div id="panel-persona" class="panel"></div>
  <div id="panel-scorecard" class="panel"></div>
  <div class="footer" id="footer"></div>
</div>

function el(tag, attrs, ...kids) {
  const e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === 'style' && typeof v === 'object') Object.assign(e.style, v);
    else if (k === 'className') e.className = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  });
  kids.forEach(c => { if (c != null) e.append(typeof c === 'string' ? c : c); });
  return e;
}
function statCard(label, value, sub, color) {
  const d = el('div', {className:'stat-card'});
  d.append(el('div', {className:'stat-label'}, label));
  const v = el('div', {className:'stat-value'}, String(value));
  if (color) v.style.color = color;
  d.append(v);
  if (sub) d.append(el('div', {className:'stat-sub'}, sub));
  return d;
}
function sectionTitle(text) { return el('h3', {className:'section-title'}, text); }
function makeCanvas(id, h) {
  const wrap = el('div', {className:'card'});
  const cvs = el('canvas', {id});
  cvs.style.width = '100%';
  cvs.style.maxHeight = (h||300)+'px';
  wrap.append(cvs);
  return { wrap, cvs };
}
function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

    data: {
      labels: sentData.map(s => s.t),
      datasets: [{
        label: 'Net Sentiment', data: sentData.map(s => s.n),

      }]

    options: { responsive:true, plugins:{legend:{display:false}} }
  });

  const secArr = Object.values(sectors).sort((a,b) => b.mentions - a.mentions);

    legend.append(item);
  });
  row.append(legend); panel.append(row);
  new Chart(c2, {
    type: 'doughnut',
    data: { labels: secArr.map(s => s.name), datasets: [{ data: secArr.map(s => s.mentions), backgroundColor: secArr.map((s,i) => SECTOR_COLORS[s.name]||PIE_COLORS[i]) }] },
    options: { responsive:true, plugins:{legend:{display:false}} }
  });

  panel.append(sectionTitle(`All Stock Picks (${D.stockPicks.length} tracked)`));
  let sortCol = 'm', sortDir = -1;

  const cols = [['t','Ticker'],['s','Sector'],['m','Mentions'],['b','Buy'],['sl','Sell'],['n','Net'],['f','First Seen'],['l','Last Seen']];
  cols.forEach(([key,label]) => {
    const th = el('th', {onClick: () => { if (sortCol===key) sortDir *= -1; else { sortCol=key; sortDir=-1; } renderRows(); }}, label);

  });
  thead.append(headerRow); table.append(thead);

        <td style="font-weight:600">${s.m}</td><td class="pos">${s.b||'-'}</td><td class="neg">${s.sl||'-'}</td>
        <td style="font-weight:600" class="${s.n>=0?'pos':'neg'}">${s.n>0?'+':''}${s.n}</td><td>${retHtml}</td>
        <td style="color:var(--dim);font-size:12px">${s.f||''}</td>`;
      tbody.append(tr);
    });
  }

}

// === TAB 1: SIGNALS (with VERDICTS + EXPANDABLE CONTEXT) ===
function buildSignals() {
  built[0] = true;
  const panel = document.getElementById('panel-signals');

  const tickers = ['ALL', ...new Set(D.signals.map(s => s.t))].sort((a,b) => a==='ALL'?-1:b==='ALL'?1:a.localeCompare(b));
  const filterRow = el('div', {style:{marginBottom:'16px',display:'flex',alignItems:'center',gap:'12px'}});
  filterRow.append(el('span', {style:{color:'var(--muted)',fontSize:'14px'}}, 'Filter by ticker:'));
  const sel = el('select');
  tickers.forEach(t => sel.append(el('option', {value:t}, t)));
  filterRow.append(sel);
  const countSpan = el('span', {style:{color:'var(--dim)',fontSize:'13px'}});
  filterRow.append(countSpan);
  panel.append(filterRow);

  const verdictContainer = el('div', {id:'verdict-container'});
  panel.append(verdictContainer);

  panel.append(sectionTitle('Monthly Buy vs Sell Signals'));
  const {wrap:w1, cvs:c1} = makeCanvas('chartMonthlySignals', 300);
  panel.append(w1);

  panel.append(sectionTitle('Signal Feed (click to expand context)'));
  const feedCard = el('div', {className:'card signal-feed', style:{padding:'0'}});
  panel.append(feedCard);

  let chart1 = null;

  function buildVerdictPanel(filter) {
    verdictContainer.innerHTML = '';
    if (filter === 'ALL') {
      const agg = D.aggregate;
      const colorClass = agg.winRate >= 70 ? 'verdict-green' : agg.winRate >= 50 ? 'verdict-yellow' : 'verdict-red';
      const vc = agg.winRate>=70?'#22c55e':agg.winRate>=50?'#eab308':'#ef4444';
      const vp = el('div', {className:'verdict-panel ' + colorClass});
      vp.innerHTML = `
        <div class="verdict-label" style="color:${vc}">AGGREGATE PORTFOLIO VERDICT</div>
        <div class="verdict-title" style="color:${vc}">${agg.overallVerdict}</div>
        <div class="verdict-detail">${agg.verdictDetail}</div>
        <div class="verdict-stats">
          <div class="verdict-stat"><div class="verdict-stat-value" style="color:#22c55e">${agg.winRate}%</div><div class="verdict-stat-label">Win Rate</div></div>
          <div class="verdict-stat"><div class="verdict-stat-value" style="color:#f97316">+${agg.avgReturn}%</div><div class="verdict-stat-label">Avg Return</div></div>
          <div class="verdict-stat"><div class="verdict-stat-value" style="color:#eab308">${agg.medianReturn}%</div><div class="verdict-stat-label">Median Return</div></div>
          <div class="verdict-stat"><div class="verdict-stat-value" style="color:#22c55e">+${agg.bestReturn}%</div><div class="verdict-stat-label">Best Pick</div></div>
          <div class="verdict-stat"><div class="verdict-stat-value" style="color:#ef4444">${agg.worstReturn}%</div><div class="verdict-stat-label">Worst Pick</div></div>
          <div class="verdict-stat"><div class="verdict-stat-value">${agg.totalBuySignals}</div><div class="verdict-stat-label">Total Buy Signals</div></div>
          <div class="verdict-stat"><div class="verdict-stat-value" style="color:#22c55e">${agg.winners}</div><div class="verdict-stat-label">Winners</div></div>
          <div class="verdict-stat"><div class="verdict-stat-value" style="color:#ef4444">${agg.losers}</div><div class="verdict-stat-label">Losers</div></div>
        </div>
        <div class="verdict-disclaimer">Returns calculated from estimated price at signal date (based on prices mentioned in chat context) to current market price. Not financial advice.</div>`;
      verdictContainer.append(vp);

      const performersCard = el('div', {className:'card', style:{marginBottom:'20px'}});
      const allVerdicts = Object.entries(D.verdicts).filter(([k,v]) => v.buyCount > 0).sort((a,b) => b[1].avgBuyReturn - a[1].avgBuyReturn);
      const top5 = allVerdicts.slice(0, 5);
      const bottom5 = allVerdicts.slice(-5).reverse();
      let th = '<div style="display:flex;gap:20px;flex-wrap:wrap">';
      th += '<div style="flex:1 1 280px"><div style="font-weight:600;color:#22c55e;margin-bottom:10px;font-size:14px">TOP PERFORMERS</div>';
      top5.forEach(([t,v]) => { th += `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)"><span class="ticker">${t}</span><span style="color:#22c55e;font-weight:700">+${v.avgBuyReturn}%</span><span style="color:var(--dim);font-size:12px">${v.buyCount} buys</span><span style="font-size:12px;color:${VERDICT_COLORS[v.color]}">${v.verdict}</span></div>`; });
      th += '</div><div style="flex:1 1 280px"><div style="font-weight:600;color:#ef4444;margin-bottom:10px;font-size:14px">BOTTOM PERFORMERS</div>';
      bottom5.forEach(([t,v]) => { th += `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)"><span class="ticker">${t}</span><span style="color:${v.avgBuyReturn>=0?'#22c55e':'#ef4444'};font-weight:700">${v.avgBuyReturn>0?'+':''}${v.avgBuyReturn}%</span><span style="color:var(--dim);font-size:12px">${v.buyCount} buys</span><span style="font-size:12px;color:${VERDICT_COLORS[v.color]}">${v.verdict}</span></div>`; });
      th += '</div></div>';
      performersCard.innerHTML = th;
      verdictContainer.append(performersCard);
    } else {
      const v = D.verdicts[filter];
      if (!v) { verdictContainer.append(el('div', {className:'card', style:{textAlign:'center',padding:'24px',color:'var(--dim)'}}, 'No verdict data for ' + filter)); return; }
      const vc = VERDICT_COLORS[v.color] || 'var(--text)';
      const vp = el('div', {className:'verdict-panel verdict-' + v.color});
      const cp = D.currentPrices[filter] || '?';
      vp.innerHTML = `
        <div class="verdict-label" style="color:${vc}">${escHtml(filter)} VERDICT</div>
        <div class="verdict-title" style="color:${vc}">${escHtml(v.verdict)}</div>
        <div class="verdict-detail">${escHtml(v.detail)}</div>
        <div class="verdict-stats">
          <div class="verdict-stat"><div class="verdict-stat-value" style="color:${v.avgBuyReturn>=0?'#22c55e':'#ef4444'}">${v.avgBuyReturn>0?'+':''}${v.avgBuyReturn}%</div><div class="verdict-stat-label">Avg Buy Return</div></div>
          <div class="verdict-stat"><div class="verdict-stat-value" style="color:#22c55e">${v.buyCount}</div><div class="verdict-stat-label">Buy Signals</div></div>
          <div class="verdict-stat"><div class="verdict-stat-value" style="color:#ef4444">${v.sellCount}</div><div class="verdict-stat-label">Sell Signals</div></div>
          <div class="verdict-stat"><div class="verdict-stat-value">$${cp}</div><div class="verdict-stat-label">Current Price</div></div>
        </div>
        <div class="verdict-disclaimer">Returns calculated from estimated price at signal date to current market price ($${cp}). Not financial advice.</div>`;
      verdictContainer.append(vp);
    }
  }

  function renderSignals(filter) {
    const filtered = filter === 'ALL' ? D.signals : D.signals.filter(s => s.t === filter);
    // Map filtered signals to their original indices for context lookup
    const indexMap = [];
    if (filter === 'ALL') {
      filtered.forEach((s, i) => indexMap.push(i));
    } else {
      D.signals.forEach((s, i) => { if (s.t === filter) indexMap.push(i); });
    }
    countSpan.textContent = `${filtered.length} signals`;
    buildVerdictPanel(filter);

    const months = {};
    filtered.forEach(s => {
      const m = s.d?.slice(0,7); if (!m) return;
      if (!months[m]) months[m] = {m, buy:0, sell:0};
      if (s.tp==='buy') months[m].buy++; else months[m].sell++;
    });
    const mArr = Object.values(months).sort((a,b) => a.m.localeCompare(b.m));
    if (chart1) chart1.destroy();
    chart1 = new Chart(c1, {
      type: 'bar',
      data: {
        labels: mArr.map(m => m.m),
        datasets: [
          { label:'Buy', data:mArr.map(m=>m.buy), backgroundColor:'#22c55e88', borderColor:'#22c55e', borderWidth:1 },
          { label:'Sell', data:mArr.map(m=>m.sell), backgroundColor:'#ef444488', borderColor:'#ef4444', borderWidth:1 }
        ]
      },
      options: { responsive:true }
    });

    feedCard.innerHTML = '';
    filtered.forEach((s, fi) => {
      const origIdx = indexMap[fi];
      const item = el('div', {className:'signal-item'});

      // Header row
      const header = el('div', {className:'signal-header'});
      let retHtml = '';
      if (s.ret !== undefined && s.ret !== null) {
        const rc = s.ret >= 0 ? '#22c55e' : '#ef4444';
        retHtml = `<span class="signal-return" style="color:${rc}">${s.ret>0?'+':''}${s.ret}%</span>`;
      }
      let priceHtml = '';
      if (s.pe) priceHtml = `<span style="color:var(--dim);font-size:11px;min-width:80px">$${s.pe} \u2192 $${s.pc||'?'}</span>`;

      header.innerHTML = `
        <span class="signal-type signal-${s.tp}">${escHtml(s.tp)}</span>
        <span class="signal-ticker">${escHtml(s.t)}</span>
        <span class="signal-date">${escHtml(s.d)}</span>
        ${priceHtml}${retHtml}
        <span class="signal-msg">${escHtml(s.msg)}</span>
        <span class="signal-expand-icon">\u25BC</span>`;
      item.append(header);

      // Context panel (hidden by default)
      const ctx = D.signalContext[origIdx] || [];
      if (ctx.length > 0) {
        const ctxPanel = el('div', {className:'context-panel'});
        ctx.forEach(c => {
          const msgDiv = el('div', {className:'ctx-msg' + (c.f ? ' ctx-focal' : '')});
          const timeHtml = c.ts ? `<span class="ctx-time">${escHtml(c.ts)}</span>` : '';
          msgDiv.innerHTML = `${timeHtml}<span class="ctx-sender">${escHtml(c.s)}</span><span class="ctx-text">${escHtml(c.t)}</span>`;
          ctxPanel.append(msgDiv);
        });
        item.append(ctxPanel);
      }

      // Toggle expand on click
      item.addEventListener('click', () => item.classList.toggle('expanded'));
      feedCard.append(item);
    });
  }

  sel.addEventListener('change', () => renderSignals(sel.value));
  renderSignals('ALL');
}

  }));

  panel.append(sectionTitle('Stock Coverage Timeline'));
  const ganttCard = el('div', {className:'card'});
  const stocks = D.stockPicks.filter(s=>s.m>=8).sort((a,b)=>(a.f||'').localeCompare(b.f||''));
  const start = new Date('2025-07-01'), end = new Date('2026-04-01');
  const totalDays = (end-start)/86400000;
  const monthLabels = el('div', {className:'month-labels'});
  ['Aug','Sep','Oct','Nov','Dec','Jan','Feb','Mar'].forEach(m=>monthLabels.append(el('span',null,m)));
  ganttCard.append(monthLabels);
  stocks.forEach(s => {
    const row = el('div', {className:'gantt-row'});
    const label = el('div', {className:'gantt-label', style:{color:SECTOR_COLORS[s.s]||'var(--text)'}}, s.t);
    const track = el('div', {className:'gantt-track'});
    if (s.f) {
      const sDate = (new Date(s.f)-start)/86400000;
      const dur = s.l ? (new Date(s.l)-new Date(s.f))/86400000 : 30;
      const bar = el('div', {className:'gantt-bar'});
      bar.style.left=(sDate/totalDays*100)+'%'; bar.style.width=Math.max(dur/totalDays*100,1)+'%';
      bar.style.background=SECTOR_COLORS[s.s]||'var(--blue)'; bar.title=`${s.t}: ${s.f} to ${s.l} (${s.m} mentions)`;
      track.append(bar);
    }
    row.append(label,track); ganttCard.append(row);
  });
  panel.append(ganttCard);
}

    <p><strong>Investment Style:</strong> Growth-oriented with strong conviction in infrastructure plays (Nuclear, AI/Semiconductors). Uses position sizing tiers, targets 1000+ shares in high-conviction names, and insists on GAAP profitability.</p><br>
    <p><strong>Trading Pattern:</strong> ${sb.buy} buy signals vs ${sb.sell} sell signals. Actionable rate of ${actionableRate}% means roughly 1 in ${Math.round(100/parseFloat(actionableRate))} messages contains a trade signal, analysis, or price target.</p>`;
  panel.append(summary);
}

document.getElementById('footer').textContent = 'Generated from WhatsApp chat analysis \u00b7 ' + D.meta.totalMessages.toLocaleString() + ' messages parsed \u00b7 ' + D.stockPicks.length + ' stocks tracked \u00b7 ' + D.aggregate.winRate + '% win rate';
</script>
